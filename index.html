    <h1>Home page</h1>

    
<fieldset id="form">
    <legend>Registration Form</legend >

       <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="enter your name" name="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="enter your email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="enter your password"  name="password"><br><br>

        <input type="submit" value="Submit"><br><br>

        <input color="red" type="color" id="favcolor" name="favcolor" value="#ff0000"><br><br>

        <input date="2023-11-25" type="date" id="birthday" name="birthday"><br><br>

        <input type="checkbox" id="subscribe" name="subscribe" value="yes">
        <label for="subscribe">Subscribe to newsletter</label><br><br>

        <select id="country" name="country">
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>

        </select><br><br>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <input for="check" type="checkbox" id="check" name="check" value="yes">
        <label for="check">I agree to the terms and conditions</label><br><br>
        <input type="submit" value="Register">
        <label for="10">10 </label>


        

    </form>
    
    </fieldset>
